  viewBox="-10 -10 420 120"
  aria-label="FOCUS"
  style="width: auto; height: 0.85em"
>
  <defs>
    <style>
      @media (prefers-color-scheme: dark) {
        :root {
          color: white;
        }
      }
      .focal line {
        stroke: currentColor;
        stroke-width: 4;
        stroke-dasharray: 0 6;
        stroke-linecap: round;
        opacity: 0.6;
      }
      .focal circle {
        fill: currentColor;
      }
    </style>
  </defs>
  <!-- Focal lines -->
  <g class="focal" transform="translate(280, 50)">
    <line x2="-80" transform="rotate(-36)" />
    <line x2="-85" transform="rotate(-18)" />
    <line x2="-88" transform="rotate(0)" />
    <line x2="-85" transform="rotate(+18)" />
