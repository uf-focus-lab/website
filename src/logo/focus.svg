    stroke-width="20"
    fill="none"
    transform=""
  />
  <path
    d="M 0 38 A 30 30 0 0 1 60 38 V 62 A 30 30 0 0 1 0 62 Z"
    stroke="currentColor"
    stroke-width="20"
    fill="none"
