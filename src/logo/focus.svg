    <circle opacity="0.4" r="14" />
    <circle opacity="0.7" r="9" />
    <circle opacity="1.0" r="4" />
  </g>
  <!-- FOCUS -->
  <path
    d="M 60,10 H 0 V 100 M 55,50 H 0"
